name: inception_time
run_dir: runs/inception_time

data:
  path: combined_repackaged.hdf
  batch_size: 128

model:
  trunk: inception_time
  trunk_cfg: {}          # builder defaults; see docs/models/inception_time.md for knobs
  heads: [ mchirp, merger_time, snr, sky_position, coa_phase ]
  head_cfg:
    hidden_units: 64
    bounded: true

loss:
  huber_delta: 1.0
  weighting: uncertainty
  snr_weight_alpha: null
  log_var_clamp: 3.0
  variance_penalty: 0.0

optim:
  lr: 1.0e-3
  warmup_epochs: 0
  schedule:
    type: plateau
    factor: 0.5
    patience: 5
    min_lr: 1.0e-6

train:
  epochs: 80
  seed: 42
  deterministic_ops: false
  diagnostics_every_n: 5
  scatter_subset: 1000
  early_stopping: false
  early_stopping_patience: 15
  verbose: 2
