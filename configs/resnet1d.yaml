name: resnet1d
run_dir: runs/resnet1d

data:
  path: combined_repackaged.hdf
  batch_size: 128
  augmentation:
    oversample:
      q_high_mchirp_low: 2

model:
  trunk: resnet1d
  trunk_cfg: {}          # builder defaults; see docs/models/resnet1d.md for knobs
  # Any subset of: mchirp, q, merger_time, snr, inclination, coa_phase,
  # polarization_angle, declination, ra. Transform/activation/loss per head
  # are bound in src/gwml/heads_spec.py and cannot be overridden here.
  heads: [mchirp, q, merger_time, snr]
  head_cfg:
    hidden_units: 64
    bounded: true

loss:
  huber_delta: 1.0
  weighting: uncertainty   # or "fixed" with fixed_weights: {mchirp: 1.0, ...}
  snr_weight_alpha: null   # e.g. 1.0 to down-weight low-SNR samples
  # resnet1d's q head is a dead sigmoid (val_std_ratio_q=0.0), not an
  # overfitting problem like the cnn trunks. The per-head clamp {q: 1.0}
  # made things worse — it starves an already-dead head of gradient share.
  # Reverted to flat 3.0 so q gets equal weight budget. If still dead after
  # warmup, try q: 4.0 or bounded: false. See q_head_action_plan.md.
  log_var_clamp: 3.0        # |s_h| bound; effective head weight range [exp(-3), exp(3)] ~ [5%, 2009%]
  variance_penalty: 0.0    # e.g. 0.1 adds lambda*(std(pred)-std(true))^2 per head

optim:
  lr: 1.0e-3
  warmup_epochs: 5         # Linear LR warmup to avoid early sigmoid saturation
  schedule:
    type: plateau          # or "step" with step_epochs / gamma
    factor: 0.5
    patience: 5
    min_lr: 1.0e-6

train:
  epochs: 80
  seed: 42
  deterministic_ops: false
  diagnostics_every_n: 5
  scatter_subset: 1000
  early_stopping: false
  early_stopping_patience: 15
  verbose: 2
