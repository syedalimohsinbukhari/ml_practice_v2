# Pre-flight check: tiny end-to-end run exercising every callback.
# Run this on the lab machine before launching any long training.
name: smoke
run_dir: runs/smoke

data:
  path: combined_repackaged.hdf
  batch_size: 32
  max_samples: 256

model:
  trunk: cnn_baseline
  trunk_cfg:
    filters: [16, 32]
  heads: [ mchirp, merger_time, snr, ra, declination, coa_phase ]
  head_cfg:
    hidden_units: 16
    bounded: true

loss:
  huber_delta: 1.0
  weighting: uncertainty
  snr_weight_alpha: null
  log_var_clamp: 3.0
  variance_penalty: 0.0

optim:
  lr: 1.0e-3
  warmup_epochs: 0
  schedule:
    type: plateau

train:
  epochs: 2
  seed: 42
  diagnostics_every_n: 1   # every epoch, so both callbacks provably fire
  scatter_subset: 128
  early_stopping: false
  verbose: 1
