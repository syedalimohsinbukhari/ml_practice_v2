name: cnn_attention
run_dir: runs/cnn_attention

data:
  path: combined_repackaged.hdf
  batch_size: 128

model:
  trunk: cnn_attention
  trunk_cfg: { }          # builder defaults; see docs/models/cnn_attention.md for knobs
  # Any subset of registered heads (see src/gwml/heads_spec.py).
  # Transform/activation/loss per head are bound there and cannot be overridden.
  heads: [ mchirp, merger_time, snr, ra, declination, coa_phase ]
  head_cfg:
    hidden_units: 64
    bounded: true

loss:
  huber_delta: 1.0
  weighting: uncertainty   # or "fixed" with fixed_weights: {mchirp: 1.0, ...}
  snr_weight_alpha: null   # e.g. 1.0 to down-weight low-SNR samples
  log_var_clamp: 3.0        # |s_h| bound; effective head weight range [exp(-3), exp(3)] ~ [5%, 2009%]
  variance_penalty: 0.0    # e.g. 0.1 adds lambda*(std(pred)-std(true))^2 per head

optim:
  lr: 1.0e-3
  warmup_epochs: 0
  schedule:
    type: plateau
    factor: 0.5
    patience: 5
    min_lr: 1.0e-7

train:
  epochs: 80
  seed: 42
  deterministic_ops: false
  diagnostics_every_n: 5
  scatter_subset: 1000
  early_stopping: false
  early_stopping_patience: 15
  verbose: 2
