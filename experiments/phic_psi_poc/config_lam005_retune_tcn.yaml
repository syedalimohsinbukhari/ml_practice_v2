# λ=0.05 retune — same as config_tcn.yaml but magnitude_penalty_lambda
# raised from 0.01 to 0.05.
#
# Purpose: Run 7 found tcn's coa_phase std_ratio still declining at λ=0.01
# (0.34 at epoch 79, trend -0.008/ep, 32/40 late epochs below the healthy
# 0.5-2.0 band). This is the highest-priority open item before the
# ι-conditioning gate — per diagnostic_log.md, tcn cannot be used as
# supporting evidence for the degeneracy conclusion until λ is retuned.

name: phic_psi_lam005_retune_tcn
run_dir: runs/phic_psi_lam005_retune_tcn

data:
  path: combined_repackaged.hdf
  batch_size: 128

model:
  trunk: tcn
  trunk_cfg: {}
  heads: [ mchirp, merger_time, snr, sky_position, coa_phase,
           polarization_angle, inclination ]
  head_cfg:
    hidden_units: 64
    bounded: true

loss:
  mode: baseline
  huber_delta: 1.0
  weighting: uncertainty
  snr_weight_alpha: null
  log_var_clamp: 3.0
  variance_penalty: 0.0
  magnitude_penalty_lambda: 0.05   # ← RETUNE: 5x Run 7's 0.01

optim:
  lr: 1.0e-3
  warmup_epochs: 0
  schedule:
    type: plateau
    factor: 0.5
    patience: 5
    min_lr: 1.0e-6

train:
  epochs: 80
  seed: 42
  deterministic_ops: false
  diagnostics_every_n: 5
  scatter_subset: 1000
  early_stopping: false
  verbose: 2
